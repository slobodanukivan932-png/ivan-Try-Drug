<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Три друга - Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="images/emblema.jpg" alt="Логотип Три друга" class="site-banner">
    </header>

    <nav>
        <a href="index.html">Головна</a>
        <a href="catalog.html" class="active">Каталог</a>
    </nav>

    <main>
        <h2 style="margin-bottom: 30px; text-align: center;">Каталог наших виробів</h2>
        
        <section class="products">
            <div class="card">
                <img src="images/bmw.jpg" alt="Маска для кішки">
                <h3>Маска для кішки</h3>
                <p class="price">Ціна: 120 грн</p>
                <button>Замовити</button>
            </div>

            <div class="card">
                <img src="images/roza.jpg" alt="Декоративна роза">
                <h3>Декоративна роза</h3>
                <p class="price">Ціна: 80 грн</p>
                <button>Замовити</button>
            </div>

            <div class="card">
                <img src="images/pidstavka.jpg" alt="Універсальна підставка">
                <h3>Універсальна підставка</h3>
                <p class="price">Ціна: 450-750 грн</p>
                <button>Замовити</button>
            </div>

            <div class="card">
                <img src="images/stitch.jpg" alt="Фігурка Стіча">
                <h3>Фігурка Стіча</h3>
                <p class="price">Ціна: 180 грн</p>
                <button>Замовити</button>
            </div>

            <div class="card">
                <img src="images/stella.jpg" alt="Фігурка Стелла">
                <h3>Фігурка Стелла</h3>
                <p class="price">Ціна: 300 грн</p>
                <button>Замовити</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Три друга</p>
    </footer>

</body>
</html>
